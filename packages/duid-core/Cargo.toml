[package]
name = "duid-core"
version = "0.1.0"
edition = "2021"
categories = [ "gui", "wasm", "web-programming"]




[features]
default = ["wasm-bindgen", "js-sys", "web-sys", "with-request-animation-frame"] #["with-dom", ]
with-lookup = [] #enumerates html tags and attributes
#with-measure = ["mt-dom/with-measure"] # log traces for measurements in various parts of the system where performance matters.
#with-debug = [] # log debug patches
with-request-animation-frame = [] # enable the use of request-animation-frame in calling dispatch
#with-dom = ["wasm-bindgen", "js-sys", "web-sys"] # for client-side usage

[dependencies]
mt-dom = "0.19"
gloo-timers = { version = "0.2.1", features = ["futures"], optional = true }
js-sys = { version = "0.3", optional = true }
duid-prettiest = { version = "0.1.0", path = "../duid-prettiest", optional = true }
paste = "1.0"
doc-comment = "0.3"
jss = { version = "0.5" }
console_log = "0.2.0"
tracing = { version = "^0.1", features = ["log"] }
#acteur = "0.12"
#async-trait = "0.1"
#js-sys = { version = "0.3", optional = true }
#log = "0.4"
#cfg-if = "1.0"
#thiserror = "1.0"
#once_cell = "1.8"

#futures = "0.3.5"
# webdom dependencies:


[dependencies.wasm-bindgen]
version = "0.2"
optional = true



[dependencies.web-sys]
version = "0.3.28"
optional = true
features = [
    "AnimationEvent",
    "Comment",
    "ClipboardEvent",
    "console",
    "CustomElementRegistry",
    "Document",
    "DocumentFragment",
    "Element",
    "Event",
    "HtmlElement",
    "EventTarget",
    "KeyboardEvent",
    "HashChangeEvent",
    "InputEvent",
    "Headers",
    "HtmlButtonElement",
    "HtmlCollection",
    "HtmlDetailsElement",
    "HtmlElement",
    "HtmlHeadElement",
    "HtmlInputElement",
    "HtmlMenuItemElement",
    "HtmlTextAreaElement",
    "HtmlFieldSetElement",
    "HtmlLinkElement",
    "HtmlLiElement",
    "HtmlMeterElement",
    "HtmlMenuItemElement",
    "HtmlProgressElement",
    "HtmlParamElement",
    "HtmlOutputElement",
    "HtmlDataElement",
    "HtmlOptGroupElement",
    "HtmlOptionElement",
    "HtmlSelectElement",
    "HtmlStyleElement",
    "HtmlTextAreaElement",
    "Storage",
    "ShadowRoot",
    "ShadowRootInit",
    "ShadowRootMode",
    "MouseEvent",
    "Node",
    "NodeList",
    "Text",
    "TransitionEvent",
    "CharacterData",
    "Performance",
    "Window",
    "History",
    "Response",
    "RequestInit",
	"Location",
	"ScrollToOptions",
    "Navigator",
    "ReadableStream",
]

[dev-dependencies]
wasm-bindgen-test = "0.3"

#[[bench]]
#name = "nodes_benchmark"
#harness = false