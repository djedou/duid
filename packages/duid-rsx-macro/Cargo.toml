[package]
name = "duid-rsx-macro"
version = "0.1.0"
edition = "2021"


[dependencies]
syn = { version = "1", features = ["full"] }
syn-rsx = { version = "0.8" }
quote = {package = "quote", version = "1.0.3"}
proc-macro2 = { version = "1" }
once_cell = "1.8"
duid-core = {path = "../duid-core", features = ["with-lookup"] }

[dev-dependencies]
duid = { path = "../../"}

[lib]
proc-macro = true